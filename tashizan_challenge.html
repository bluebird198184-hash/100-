<html lang="ja">
<head>
    <meta charset="UTF-8">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-blue': '#4E98F4', // 明るい青
                        'primary-green': '#65C466', // 明るい緑

                    }
                }

    </script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        /*
        // --- 修正: Firebaseの初期化を強制的にスキップし、ローカル起動を保証します ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        setLogLevel('Debug');
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');

        let app, db, auth, userId;

        // Promiseを使って初期化完了を待てるようにする
        let firebaseReadyPromiseResolve;
        const firebaseReadyPromise = new Promise(resolve => {
            firebaseReadyPromiseResolve = resolve;
        });
        window.firebaseReadyPromise = firebaseReadyPromise; // windowに公開

        async function initializeFirebase() {
            try {
                if (Object.keys(firebaseConfig).length > 0) {
                    app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    userId = auth.currentUser?.uid || crypto.randomUUID();
                    window.firebaseInitialized = true;
                    window.db = db;
                    window.userId = userId;
                    window.appId = appId;
                    
                    window.doc = doc;
                    window.setDoc = setDoc;
                    window.getDoc = getDoc;
                    
                    firebaseReadyPromiseResolve(true); // Firebase初期化完了を通知
                } else {
                    console.error("Firebase configuration is missing. Running in local mode.");
                    window.firebaseInitialized = false;
                    // ローカルモードでもロードは続行させる
                    firebaseReadyPromiseResolve(false); 
                }
            } catch (error) {
                console.error("Firebase initialization failed:", error);
                window.firebaseInitialized = false;
                firebaseReadyPromiseResolve(false); // 初期化失敗を通知
            } finally {
                // ここで loadHighScores を呼び出すことで、必ず初期化後にスコアを読み込む
                if (window.loadHighScores) window.loadHighScores(); 
            }
        }

        initializeFirebase();
        */
        
        // --- 強制ローカル起動設定 ---
        window.firebaseReadyPromise = Promise.resolve(false); 
        window.firebaseInitialized = false;
        window.userId = 'local-user'; // ダミーのユーザーID
        
        // ロード処理をすぐに開始
        document.addEventListener('DOMContentLoaded', () => {
            if (window.loadHighScores) {
                window.loadHighScores();
            } else {
                // loadHighScores関数がまだロードされていない場合は、安全のためにローディングを非表示にする
                const loadingOverlay = document.getElementById('loading-overlay');
                if (loadingOverlay) loadingOverlay.classList.add('hidden');
                const startSection = document.getElementById('start-section');
                if (startSection) startSection.classList.remove('hidden');
            }
        });
    </script>

    <style>
        /* 1年生向けデザイン調整 */
        body {
            font-family: 'Rounded Mplus 1p', sans-serif; /* メインフォント */
            background-color: #FFFDE7; /* ベースカラーを明るいクリームイエローに */
            color: #333333; /* テキストを濃いグレーに */
        }
        .main-font {
            font-family: 'Rounded Mplus 1p', sans-serif;
        }
        
        /* ボタンデザインの変更 */
        .btn {
            @apply w-full text-white font-extrabold py-3 px-6 rounded-xl shadow-lg transition-transform transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-4;
        }

            @apply bg-primary-green hover:bg-emerald-600 focus:ring-emerald-300 shadow-emerald-500/50;

        /* 入力ボックスの調整 */

            background-color: #FEFCE8; /* 薄い黄色 */

</head>
<body class="text-text-dark">

    <div class="container mx-auto p-4 sm:p-6 md:p-8 max-w-2xl">
        <header class="text-center mb-6 pt-2 pb-4">
            <!-- 鉛筆とノートのアイコンを削除 -->

                100までの たしざんチャレンジ！
            </h1>
            <p class="main-font text-base sm:text-lg text-primary-blue font-bold">
                <!-- サイズを lg/xl から base/lg に縮小 -->
                10もんに チャレンジ！
            </p>
        </header>

        <!-- ハイスコアとベストタイムの表示 -->
        <div class="flex justify-center sm:justify-end items-center text-sm bg-white p-3 rounded-xl shadow-md border-2 border-primary-blue/50 mb-6">
            <div class="text-center">
                <p class="font-extrabold text-amber-700 text-sm">ハイスコア</p>
                <span id="high-score-display" class="font-extrabold text-lg text-amber-800">0 / 10</span>
            </div>
            <div class="w-px h-8 bg-gray-300 mx-3"></div>
            <div class="text-center">
                <p class="font-extrabold text-gray-700 text-sm">ベストタイム</p>
                <span id="best-time-display" class="font-extrabold text-lg text-primary-blue">--</span>
            </div>
        </div>

        <main id="app-container" class="bg-white rounded-2xl shadow-2xl p-6 sm:p-8 relative border-4 border-primary-green/50">
            <!-- 修正: 初期状態でローディングを表示 -->
            <div id="loading-overlay" class="loading-overlay"> 
                <p class="main-font text-2xl font-extrabold text-primary-blue">じゅんびちゅう...</p>
            </div>

            <!-- Start Section (応援要素なし) -->
            <div id="start-section" class="hidden text-center p-2">
                <div class="start-btn-container">
                    <button id="start-new-btn" class="btn btn-blue main-font text-2xl py-4 px-10 transform hover:scale-105 transition-all duration-300">
                        <!-- ボタンサイズを縮小 -->

                    </button>
                </div>
            </div>

            <!-- Quiz Section -->
            <div id="quiz-section" class="hidden">
                <div id="progress-text" class="main-font text-xl sm:text-2xl font-extrabold text-primary-blue text-center mb-3 p-2 bg-primary-blue/10 rounded-lg">
                    <!-- サイズを 2xl/3xl から xl/2xl に縮小 -->
                    もんだい 1 / 10
                </div>

                <div class="w-full bg-primary-blue/30 rounded-full h-3 mb-5">
                    <!-- プログレスバーの高さを縮小 -->
                    <div id="progress-bar" class="bg-primary-blue h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
                
                <div class="flex justify-between items-center mb-5 text-sm sm:text-base font-bold">
                    <!-- スコアとタイマーの文字サイズを縮小 -->
                    <div id="score-text" class="text-primary-green text-lg">せいかい: 0</div>
                    <div id="timer-display" class="main-font text-2xl text-red-600 border-2 border-red-600 p-1 rounded-md">
                        0:00.0
                    </div>
                </div>

                <div id="question-container" class="bg-primary-blue/10 text-center p-6 sm:p-10 rounded-xl mb-6 shadow-inner border-4 border-primary-blue">
                    <!-- サイズを 5xl/6xl から 4xl/5xl に縮小 -->

                </div>

                <div class="flex flex-col sm:flex-row items-center gap-3 mb-5">
                    <input type="number" id="answer-input" class="w-full sm:flex-1 main-font text-3xl text-center p-3 border-4 rounded-xl focus:ring-4 placeholder-gray-400" placeholder="こたえをいれてね">

                    <p id="final-score-text" class="main-font text-4xl sm:text-5xl font-extrabold text-amber-800"></p>

                <div id="mistakes-container" class="mb-6 hidden">
                    <h3 class="main-font text-lg font-extrabold text-text-dark mb-3">

                <!-- 10問終了時は「ホームへ戻る」ボタンに変更 -->
                <button id="go-to-home-btn" class="btn btn-blue main-font text-xl py-4">

                </button>
            </div>
            
            <!-- Mid-Quit Result Section (途中終了時) -->
            <div id="mid-quit-section" class="hidden text-center">
                <h2 class="main-font text-2xl sm:text-3xl font-extrabold text-red-700 mb-4">チャレンジ ちゅうし</h2>
                <div class="bg-red-100 p-6 rounded-xl mb-6 border-4 border-red-500 shadow-xl">
                    <p class="main-font text-xl text-red-800 font-bold mb-2">これまでのせいせき</p>
                    <p id="mid-quit-score-text" class="main-font text-3xl sm:text-4xl font-extrabold text-red-800"></p>
                </div>

                    ハイスコアは こうしん されないよ。

                    さあ、はじめよう！

    </div>

    <!-- ユーザーIDを画面左下（フッター）に表示 -->
    <footer id="user-id-footer">
        <!-- 修正: Firebaseを使わない場合は「ローカルモード」と表示 -->
        <span id="user-id-display">ユーザーID: ローカルモード</span>
    </footer>

    <script>
        const TOTAL_QUESTIONS = 10;
        const HIGH_SCORE_STORAGE_KEY = 'tashizan_high_score_10_questions';
        
        // --- Promiseを使ってFirebaseの初期化完了を待つ (Firebaseをスキップ) ---
        // 修正: Promise.resolve(false) を返すことで、Firebaseは未初期化として扱う
        const getFirebaseReadyPromise = () => window.firebaseReadyPromise; 

        let questions = [];
        let state = {
            currentQuestionIndex: 0,
            score: 0,
            mistakes: [],
            totalQuestions: TOTAL_QUESTIONS,
            isQuizActive: false,
            startTime: null,
            elapsedTime: 0,
        };
        // Infinityはベストタイム（最小値）の初期値として使用
        let highScore = { score: 0, time: Infinity }; 
        let timerInterval;

        const elements = {
            loadingOverlay: document.getElementById('loading-overlay'),
            startSection: document.getElementById('start-section'),
            startNewBtn: document.getElementById('start-new-btn'),
            
            quizSection: document.getElementById('quiz-section'),
            resultsSection: document.getElementById('results-section'),
            midQuitSection: document.getElementById('mid-quit-section'),
            midQuitScoreText: document.getElementById('mid-quit-score-text'),
            restartFromQuitBtn: document.getElementById('restart-from-quit-btn'),
            progressText: document.getElementById('progress-text'),
            scoreText: document.getElementById('score-text'),
            progressBar: document.getElementById('progress-bar'),
            timerDisplay: document.getElementById('timer-display'), 
            questionText: document.getElementById('question-text'),
            answerInput: document.getElementById('answer-input'),
            checkBtn: document.getElementById('check-btn'),
            feedbackText: document.getElementById('feedback-text'),
            nextBtn: document.getElementById('next-btn'),
            endQuizBtn: document.getElementById('end-quiz-btn'),

            highScoreDisplay: document.getElementById('high-score-display'), 
            bestTimeDisplay: document.getElementById('best-time-display'), 
            userIdDisplay: document.getElementById('user-id-display'), 

            finalScoreText: document.getElementById('final-score-text'),
            finalTimeText: document.getElementById('final-time-text'), 
            finalMessage: document.getElementById('final-message'),
            highScoreMessage: document.getElementById('high-score-message'),
            mistakesContainer: document.getElementById('mistakes-container'),
            mistakeCount: document.getElementById('mistake-count'),
            mistakesList: document.getElementById('mistakes-list'),
            goToHomeBtn: document.getElementById('go-to-home-btn'), 
        };
        
        // --- Utility for Time Formatting ---
        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const centiseconds = Math.floor((ms % 1000) / 100); 
            return `${minutes}:${String(seconds).padStart(2, '0')}.${centiseconds}`;
        }
        
        function updateTimerDisplay() {
            if (state.startTime) {
                state.elapsedTime = Date.now() - state.startTime;
            }
            elements.timerDisplay.textContent = formatTime(state.elapsedTime);
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            state.startTime = Date.now() - state.elapsedTime; 
            timerInterval = setInterval(updateTimerDisplay, 100);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // --- Firebase/Firestore Logic (Local Fallback Only) ---

        window.loadHighScores = async function() {
            // Firebase初期化を待機 (ローカルモードではすぐに完了する)
            await getFirebaseReadyPromise(); // Promiseが解決するのを待つ

            // 修正: ユーザーID表示をローカルモードに
            elements.userIdDisplay.textContent = window.userId ? `ユーザーID: ${window.userId}` : 'ユーザーID: ローカルモード';

            try {
                // FirebaseInitializedフラグに関わらず、ローカルストレージをメインとして使う
                // --- 2. Local Storage Load (Fallback) ---
                console.log("Loading high score from Local Storage (Firebase skipped).");
                const localData = JSON.parse(localStorage.getItem(HIGH_SCORE_STORAGE_KEY) || '{}');
                highScore.score = localData.score || 0;
                // NaNチェックとInfinityチェックを追加
                highScore.time = isNaN(localData.time) || localData.time === Infinity ? Infinity : localData.time; 
            
            } catch (error) {
                console.error("Error loading high score from Local Storage:", error);
                // エラーが発生した場合も、現在のhighScore（初期値0/Infinity）を維持
            } finally {
                const timeDisplay = highScore.time === Infinity ? '--' : formatTime(highScore.time);
                elements.highScoreDisplay.textContent = `${highScore.score} / ${TOTAL_QUESTIONS}`;
                elements.bestTimeDisplay.textContent = timeDisplay;
                showStartSection(); // 読み込み完了後、スタート画面へ
            }
        }

        async function saveHighScore(newScore, newTime) {
            // ハイスコア更新チェック
            let isNewHighScore = false;
            if (newScore > highScore.score) {
                isNewHighScore = true;
            } else if (newScore === highScore.score && newTime < highScore.time) {
                // スコアが同点の場合、タイムが速ければ更新
                isNewHighScore = true;
            }

            if (!isNewHighScore) return false;

            // 修正: Firebaseへの保存処理をスキップ
            // --- Local Storage Save ---
            console.log("Saving high score to Local Storage.");
            localStorage.setItem(HIGH_SCORE_STORAGE_KEY, JSON.stringify({ score: newScore, time: newTime }));
            
            // スコアが更新されたので、ローカル変数と表示を更新する
            highScore.score = newScore;
            highScore.time = newTime;
            
            const timeDisplay = formatTime(highScore.time);
            elements.highScoreDisplay.textContent = `${highScore.score} / ${TOTAL_QUESTIONS}`;
            elements.bestTimeDisplay.textContent = timeDisplay;

            return true;
        }

        // --- Quiz Logic ---

        function generateRandomQuestions() {
            const newQuestions = [];
            for (let i = 0; i < TOTAL_QUESTIONS; i++) {
                let a, b, q, answer;
                
                // 答えが100を超えない 2桁 + 1桁 の問題を生成 (10-99 + 1-9)
                do {
                    a = Math.floor(Math.random() * 90) + 10; 
                    b = Math.floor(Math.random() * 9) + 1;  
                    answer = a + b;
                } while (answer > 100);

                q = `${a} + ${b}`;
                newQuestions.push({ q, a: answer });
            }
            return newQuestions;
        }

        function startNewQuiz() {
            questions = generateRandomQuestions();
            state.currentQuestionIndex = 0;
            state.score = 0;
            state.mistakes = [];
            state.totalQuestions = questions.length;
            state.elapsedTime = 0; 
            state.isQuizActive = true;
            
            elements.startSection.classList.add('hidden');
            elements.resultsSection.classList.add('hidden');
            elements.midQuitSection.classList.add('hidden');
            elements.quizSection.classList.remove('hidden');
            
            startTimer();
            renderQuestion();
            updateScore();
            updateProgress();
        }

        function renderQuestion() {
            const question = questions[state.currentQuestionIndex];
            elements.questionText.textContent = question.q + " = ";
            elements.answerInput.value = '';
            elements.answerInput.focus();
            elements.feedbackText.textContent = '';
            elements.nextBtn.classList.add('hidden');
            elements.checkBtn.classList.remove('hidden');
            elements.checkBtn.disabled = false;
        }

        function updateProgress() {
            elements.progressText.textContent = `もんだい ${state.currentQuestionIndex + 1} / ${state.totalQuestions}`;
            const progressPercentage = ((state.currentQuestionIndex) / state.totalQuestions) * 100;
            elements.progressBar.style.width = `${progressPercentage}%`;
        }
        
        function updateScore() {
            elements.scoreText.textContent = `せいかい: ${state.score}`;
        }

        function checkAnswer() {
            const userAnswer = parseInt(elements.answerInput.value, 10);
            if (isNaN(userAnswer)) {
                elements.feedbackText.textContent = '❌ かずを いれてね！';
                elements.feedbackText.className = 'main-font text-2xl font-extrabold text-red-500';
                return;
            }

            const correctAnswer = questions[state.currentQuestionIndex].a;
            
            elements.checkBtn.disabled = true;

            if (userAnswer === correctAnswer) {
                state.score++;
                elements.feedbackText.textContent = 'やったね！せいかい！🎉';
                elements.feedbackText.className = 'main-font text-3xl font-extrabold text-primary-green';
            } else {
                elements.feedbackText.textContent = `ざんねん… こたえは ${correctAnswer}だよ`;
                elements.feedbackText.className = 'main-font text-2xl font-extrabold text-red-500';
                state.mistakes.push({
                    question: questions[state.currentQuestionIndex].q,
                    correctAnswer: correctAnswer,
                    userAnswer: userAnswer,
                    index: state.currentQuestionIndex + 1
                });
            }
            
            updateScore();
            elements.checkBtn.classList.add('hidden');
            elements.nextBtn.classList.remove('hidden');
            elements.nextBtn.focus();
        }

        function nextQuestion() {
            const progressPercentage = ((state.currentQuestionIndex + 1) / state.totalQuestions) * 100;
            elements.progressBar.style.width = `${progressPercentage}%`;

            state.currentQuestionIndex++;
            if (state.currentQuestionIndex < state.totalQuestions) {
                renderQuestion();
                updateProgress();
            } else {
                showResults(false); // 全問終了
            }
        }

        function endQuiz() {
            if (state.isQuizActive) {
                showResults(true); // 途中終了
            }
        }

        async function showResults(isMidQuit) {
            stopTimer(); 
            state.isQuizActive = false;

            elements.quizSection.classList.add('hidden');
            elements.highScoreMessage.classList.add('hidden'); 
            
            if (isMidQuit) {
                // 途中終了画面
                elements.resultsSection.classList.add('hidden');
                elements.midQuitSection.classList.remove('hidden');
                
                // 途中終了の場合はスコアを反映しない
                const totalAnswered = state.currentQuestionIndex + 1; 
                const displayAnswered = totalAnswered > 0 ? totalAnswered : 0; 

                const quitScoreText = `${displayAnswered}もんだいのうち ${state.score}もん せいかい！ (${state.score}/${displayAnswered})`;
                elements.midQuitScoreText.textContent = quitScoreText;

            } else {
                // 10問完了画面
                elements.midQuitSection.classList.add('hidden');
                elements.resultsSection.classList.remove('hidden');

                elements.finalScoreText.textContent = `ぜんぶで ${state.score}もん せいかい！`;
                elements.finalTimeText.textContent = `タイム: ${formatTime(state.elapsedTime)}`;
                
                let message = '';
                if (state.score === state.totalQuestions) {
                    message = 'たいへん よく できました！ えらいね！💯';
                } else if (state.score >= state.totalQuestions * 0.8) {
                    message = 'あとすこし！つぎは まんてんを めざそう！';
                } else {
                    message = 'どんまい！ ゆっくり がんばろうね！';
                }
                elements.finalMessage.textContent = message;
                
                // 修正: 10問完走時は必ずハイスコアをチェックし、更新されていれば保存する
                const isHighScore = await saveHighScore(state.score, state.elapsedTime);
                if (isHighScore) {
                    elements.highScoreMessage.classList.remove('hidden');
                }

                if (state.mistakes.length === 0) {
                    elements.mistakesContainer.classList.add('hidden');
                } else {
                    elements.mistakesContainer.classList.remove('hidden');
                    elements.mistakeCount.textContent = state.mistakes.length;
                    elements.mistakesList.innerHTML = '';
                    state.mistakes.forEach(mistake => {
                        const li = document.createElement('li');
                        li.className = 'main-font mb-2 p-2 bg-red-100 rounded text-base border border-red-300';
                        li.innerHTML = `<span class="font-extrabold text-red-600">${mistake.index}.</span> ${mistake.question} の こたえは <span class="font-extrabold text-primary-blue">${mistake.correctAnswer}</span> だよ。`;
                        elements.mistakesList.appendChild(li);
                    });
                }
            }
        }

        function showStartSection() {
            stopTimer(); // タイマーが動いている場合は止める
            state.elapsedTime = 0;
            updateTimerDisplay();

            elements.quizSection.classList.add('hidden');
            elements.resultsSection.classList.add('hidden');
            elements.midQuitSection.classList.add('hidden');
            
            // --- 読み込み完了後にローディング画面を非表示にする ---
            elements.loadingOverlay.classList.add('hidden'); 
            elements.startSection.classList.remove('hidden');
        }

        // --- Event Listeners ---

        elements.checkBtn.addEventListener('click', checkAnswer);
        elements.answerInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault(); 
                if (!elements.checkBtn.classList.contains('hidden')) {
                    checkAnswer();
                } else if (!elements.nextBtn.classList.contains('hidden')) {
                    nextQuestion();
                }
            }
        });
        elements.nextBtn.addEventListener('click', nextQuestion);
        elements.endQuizBtn.addEventListener('click', endQuiz);
        elements.startNewBtn.addEventListener('click', startNewQuiz);
        elements.goToHomeBtn.addEventListener('click', showStartSection); 
        elements.restartFromQuitBtn.addEventListener('click', startNewQuiz);

        // --- 修正: DOMContentLoaded でロード処理を開始し、ローディング画面を確実に表示させる ---
        document.addEventListener('DOMContentLoaded', () => {
            elements.loadingOverlay.classList.remove('hidden');
            // type="module"のスクリプトで loadHighScores を呼び出す代わりに、ここで直接呼び出す
            // 強制的にローカルモードで動作させるため、この呼び出しはすぐに showStartSection() に進むはず
            if (window.loadHighScores) {
                window.loadHighScores();
            } else {
                // 万が一 loadHighScores が定義されていなくても、画面が止まらないようにする
                showStartSection();
            }
        });
    </script>
</body>
</html>
